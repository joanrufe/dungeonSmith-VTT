<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SceneSmith - Player</title>
  <link rel="icon" type="image/png" href="./SceneSmith.png">
  <link rel="stylesheet" href="/css/styles.css?v=scenesmith-clean-1">
  <link rel="stylesheet" href="/css/dm.css?v=scenesmith-clean-1">
  <link rel="stylesheet" href="/css/theme.css?v=scenesmith-clean-1">
  <style>
    body {
      background-color: #080808;
      color: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    #login-container {
      width: 400px;
      margin: 100px auto;
      padding: 30px;
      background-color: #111;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 0;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
      text-align: center;
    }

    #login-container h1 {
      margin-bottom: 20px;
    }

    #login-container p {
      margin-bottom: 20px;
      font-size: 14px;
      color: #ccc;
    }

    #login-container form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #login-container label {
      margin-bottom: 10px;
      font-size: 16px;
    }

    #login-container input[type="password"] {
      width: 80%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 0;
      background: #151515;
      color: white;
    }

    #login-container button {
      padding: 10px 20px;
      background-color: #151515;
      border: 1px solid #ff7a18;
      border-radius: 0;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    #login-container button:hover {
      background-color: rgba(255,122,24,0.22);
    }
  </style>
</head>
<body>
  <div id="login-container">
    <img src="/SceneSmith.png" alt="SceneSmith Logo" style="width: 100px; margin-bottom: 20px;">
    <h1>Player Login</h1>
    <p>Ask the DM for the player password.</p>
    <form method="POST" action="/player-login">
      <label for="password">Enter Player Password:</label>
      <input type="password" name="password" id="password" required autofocus placeholder="Password">
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
